<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Perfil Institucional - Muttley</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .perfil-card { background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); width: 100%; max-width: 550px; border-top: 4px solid #4CAF50; }
        h2 { color: #4CAF50; margin-top: 0; }
        .info-group { margin: 15px 0; border-bottom: 1px solid #2b2b2b; padding-bottom: 8px; }
        .label { color: #888; font-size: 0.8em; text-transform: uppercase; }
        .valor { font-size: 1.1em; margin-top: 4px; font-weight: bold; }
        .actions { margin-top: 25px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 18px; border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 0.9em; }
        .btn-edit { background-color: #4CAF50; color: white; }
        .btn-delete { border: 1px solid #ff6b6b; color: #ff6b6b; }
        .btn-manage { background-color: #2196F3; color: white; } /* Para gerenciar palestras futuramente */
    </style>
</head>
<body>

    <div class="perfil-card" th:each="inst : ${listaInstituicoes}">
        <h2>Painel da Instituição</h2>
        
        <div class="info-group">
            <div class="label">Nome da Instituição</div>
            <div class="valor" th:text="${inst.nome}">FATEC Zona Leste</div>
        </div>

        <div class="info-group">
            <div class="label">CNPJ</div>
            <div class="valor" th:text="${inst.cnpj}">00.000.000/0001-00</div>
        </div>

        <div class="info-group">
            <div class="label">E-mail de Contato</div>
            <div class="valor" th:text="${inst.email}">contato@fateczl.edu.br</div>
        </div>

        <div class="actions">
            <a href="#" class="btn btn-manage">Gerenciar Palestras</a>
            
            <a th:href="@{/instituicao/editar/{id}(id=${inst.id})}" class="btn btn-edit">Editar Perfil</a>
            
            <a th:href="@{/instituicao/delete/{id}(id=${inst.id})}" 
               class="btn btn-delete" 
               onclick="return confirm('Excluir o registro da instituição?')">Excluir</a>
        </div>
    </div>

</body>
</html>
