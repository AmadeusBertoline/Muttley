<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Palestrante</title>
    <style>
        body { font-family: sans-serif; margin: 50px; background-color: #121212; color: white; }
        form { max-width: 400px; background: #1e1e1e; padding: 20px; border-radius: 8px; }
        div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #333; background: #2b2b2b; color: white; }
        button { background-color: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        .error { color: #ff6b6b; font-size: 0.8em; }
    </style>
</head>
<body>
    <h2>Cadastro de Palestrante</h2>

    <form th:action="@{/palestrante/salvar}" th:object="${palestrante}" method="post">
        
        <input type="hidden" th:field="*{id}" />

        <div>
            <label>Nome:</label>
            <input type="text" th:field="*{nome}" />
            <span class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
        </div>

        <div>
            <label>Telefone:</label>
            <input type="text" th:field="*{telefone}" />
            <span class="error" th:if="${#fields.hasErrors('telefone')}" th:errors="*{telefone}"></span>
        </div>

        <div>
            <label>CPF:</label>
            <input type="text" th:field="*{CPF}" />
            <span class="error" th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></span>
        </div>

        <button type="submit">Finalizar Cadastro</button>
        <a th:href="@{/palestrante}" style="color: #bbb; margin-left: 10px;">Cancelar</a>
    </form>
</body>
</html>
